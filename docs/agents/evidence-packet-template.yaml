schema_version: "1.0"
kind: evidence_packet
line_cap: 60
raw_evidence_policy: index_only_manifest_no_raw_logs_or_traces

subject:
  type: "<issue_pr|phase>"
  issue_number: "<issue-number-or-empty>"
  pr_number: "<pr-number-or-empty>"
  phase: "<phase-name-or-empty>"
  branch: "<branch-name>"
  sha: "<commit-sha>"

verifier:
  actor: "<verifier-worker-session-or-agent-name>"
  actor_role: "pr_verifier"
  verifier_session_id: "<session-id-or-artifact-ref>"
  started_at: "<ISO-8601 timestamp>"
  completed_at: "<ISO-8601 timestamp>"

proof_of_separation:
  worker_result_ref: "<worker-result-artifact-ref>"
  worker_actor: "<worker-session-or-agent-name>"
  worker_session_id: "<session-id-or-artifact-ref>"
  verifier_actor: "<verifier-worker-session-or-agent-name>"
  verifier_session_id: "<session-id-or-artifact-ref>"
  verifier_is_distinct_from_worker: true
  verifier_read_worker_result_only: true

status: "<pass|blocked|fail>"

test_case_verification: {applies: false, test_case_id: "<E2E-id-or-empty>", target_case: "<pass|blocked|fail|n/a>", regression_bucket: "<pass|blocked|fail|n/a>", failure_signature: "<stable-signature-or-none>", artifact_manifest_ref: "<bundle-ref-or-empty>"}

acceptance_criteria_matrix:
  - {ac_id: "AC1", status: "<pass|blocked|fail>", evidence_ref: "<artifact-id-or-handoff-path>", note: "<one-line observed result>"}

gates:
  diagnostics_and_build_gate: {status: "<pass|not_applicable|blocked|fail>", evidence_ref: "<artifact-id-or-check-run-url>"}
  surface_qa_gate: {status: "<pass|not_applicable|blocked|fail>", evidence_ref: "<artifact-id-or-check-run-url>"}
  review_gate: {status: "<pass|not_applicable|blocked|fail>", evidence_ref: "<artifact-id-or-check-run-url>"}
  security_gate: {status: "<pass|not_applicable|blocked|fail>", evidence_ref: "<artifact-id-or-check-run-url>"}

role_boundary:
  acceptance_qa_owner: "pr_verifier"
  main_agent_ran_issue_qa: false
  worker_self_checks_are_not_final_acceptance: true

artifact_manifest:
  bundle_ref: "<ci-artifact-url-or-local-artifact-path>"
  retention: "<retention-policy-or-empty>"
  items:
    - {id: "<stable-artifact-id>", kind: "<summary|log|screenshot|trace|other>", executor_role: "pr_verifier", path: "<path-inside-bundle>", sha256: "<sha256-or-empty>", description: "<one-line purpose>"}

compact_summary:
  outcome: "<one-line verifier conclusion>"
  automated_checks: "<one-line pass/fail summary, no raw output>"
  manual_qa: "<one-line surface result, no step transcript>"
  risks_or_limitations: ["<risk, limitation, or none>"]

next_recommended_step: "<single next action for orchestrator or human reviewer>"
