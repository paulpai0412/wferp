  post_merge_workspace_hygiene_comment_fields:
    - primary_workspace_branch_before
    - primary_workspace_branch_after
    - dirty_state_detected
    - wip_branch_created
    - stash_created
    - workspace_clean_after
    - issue_worktree_removed
    - cleanup_status
    - blocked_reason
  release_summary_override_fields:
