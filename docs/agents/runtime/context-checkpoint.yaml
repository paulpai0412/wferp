schema_version: "1.0"
kind: context_checkpoint
line_cap: 80

subject:
  issue_number: "1"
  branch: "main"
  role: "main_orchestrator"
  checkpoint_reason: "post_issue_6_release"

context_budget:
  warning_at_percent: 45
  stop_and_rotate_at_percent: 50
  measured_percent_used: "unknown"
  must_rotate_now: true

resume_policy:
  checkpoint_only_cross_session_resume: true
  do_not_import_full_prior_transcript: true
  raw_evidence_policy: "index_only; raw logs/traces stay in artifact bundle"

state:
  completed:
    - "Issue #16 context budget and release_worker workflow merged via PR #17."
    - "Issue #6 completed full worker -> verifier -> release_worker flow and merged via PR #18."
    - "Fresh verifier evidence for issue #6 was published at docs/agents/evidence/issue-6-pr-18.yaml."
  in_progress:
    - "Run PRD phase completeness audit because no ready-for-agent issue currently remains."
  next:
    - "Compare PRD #1 coverage against merged slices and decide whether to create more issues or enter phase_full_e2e_and_qa."
  blockers:
    - "none"

refs:
  issue_packet: ""
  worker_result: "docs/agents/worker-results/issue-6.yaml"
  evidence_packet: "docs/agents/evidence/issue-6-pr-18.yaml"
  handoff: "docs/agents/handoffs/issue-6.yaml"
  artifact_bundle: ""

compact_payload:
  active_target:
    issue_number: "1"
    branch: "main"
    role: "main_orchestrator"
    next_flow: "prd_phase_completeness_audit"
  authoritative_refs:
    - "docs/prds/2026-05-06-workflow-erp-dashboard-builder.md"
    - "docs/agents/handoffs/issue-6.yaml"
    - "docs/agents/autonomous-development-workflow.yaml"
  state_snapshot:
    completed:
      - "Issue #16 context budget and release_worker workflow merged via PR #17."
      - "Issue #6 merged and closed after fresh verifier and release summary."
    in_progress:
      - "Audit whether PRD #1 is fully covered by merged slices."
    next:
      - "If PRD coverage is incomplete, return to create_vertical_slice_issues."
      - "If PRD coverage is complete, continue to phase_full_e2e_and_qa."
    blockers:
      - "none"
  resume_rules:
    - "Resume from checkpoint and compact payload, not full chat history."
    - "Keep raw evidence as refs only; do not inline logs or traces."
  immediate_next_action: "Run PRD phase completeness audit before selecting any new issue flow."

metadata:
