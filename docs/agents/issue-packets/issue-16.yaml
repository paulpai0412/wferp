schema_version: "1.0"
kind: issue_packet

issue:
  number: "16"
  title: "Add context budget gate and release worker workflow"
  url: "https://github.com/paulpai0412/wferp/issues/16"
  labels: [ready-for-agent]
  parent: {type: "workflow-self-repair", reference: "docs/agents/autonomous-development-workflow.yaml"}

branch: {name: "agent/issue-16-context-budget-release-worker", base: "main"}

objective: "Add enforceable context-budget controls and a narrow release_worker role to the autonomous workflow contract."

acceptance_criteria:
  - {id: "AC1", text: "Workflow defines 45% checkpoint warning, 50% stop/rotate, and checkpoint-only cross-session resume.", evidence_hint: "Verifier inspects workflow policy and checkpoint template."}
  - {id: "AC2", text: "Workflow defines release_worker conditional merge/close rules after verifier pass, mergeability, required checks, and human approval policy.", evidence_hint: "Verifier inspects release worker policy and tracker docs."}
  - {id: "AC3", text: "Issue/evidence/handoff/worker artifacts have explicit line caps and index-only raw-evidence policy.", evidence_hint: "Script gate validates caps on templates and current issue packet."}
  - {id: "AC4", text: "A repo script validates artifact caps and required checkpoint fields without reading raw logs.", evidence_hint: "Verifier runs script and records compact output."}
  - {id: "AC5", text: "Docs preserve main-agent contract-validation-only role and verifier-owned QA.", evidence_hint: "Verifier checks no workflow text authorizes main QA."}

scope:
  in:
    - "docs/agents/autonomous-development-workflow.yaml"
    - "docs/agents/*-template.yaml, docs/agents/issue-tracker.md"
    - "docs/agents/runtime/context-checkpoint.yaml"
    - "scripts/agent_context_budget_check.py"
  out:
    - "Product issue #6 implementation"
    - "Direct main-agent QA, production release automation, destructive git operations"

bootstrap_context:
  required_reads: ["AGENTS.md", "docs/agents/autonomous-development-workflow.yaml", "docs/agents/issue-tracker.md"]
  context_budget: {checkpoint_warning_at_percent: 45, stop_and_rotate_at_percent: 50}
  relevant_paths: ["docs/agents", "scripts"]
  prior_handoff: "none"

implementation_notes:
  constraints:
    - "line_cap: issue_packet<=80, handoff<=35, evidence_packet<=60, checkpoint<=80, worker_result<=80; raw evidence is index-only."
    - "Keep issue packet <=80 lines, handoff <=35, evidence <=60, checkpoint <=80."
    - "release_worker may merge/close only when verifier packet passes and human approval policy is satisfied; otherwise blocked."
    - "Use GIT_MASTER=1 prefix for git commands."
  risks: ["Do not weaken role separation by letting main run QA."]
  dependencies: ["User selected conditional direct release_worker execution."]

verification_plan:
  worker_self_checks:
    - {command: "python3 scripts/agent_context_budget_check.py", purpose: "implementation feedback only", success_criteria: "Artifact caps and checkpoint schema pass."}
  verifier_acceptance_checks:
    required_gates: ["diagnostics_and_build_gate", "surface_qa_gate", "review_gate"]
    automated_checks:
      - {command: "python3 scripts/agent_context_budget_check.py", success_criteria: "Verifier observes pass."}
  verifier_manual_qa:
    owner: "pr_verifier"
    surface: "docs-script"
    happy_path: "Inspect workflow docs and run the context budget script."
    refusal_or_error_path: "Temporarily reason about over-cap artifact or missing checkpoint field and confirm script/policy would block."

handoff_contract: {repo_path: "docs/agents/handoffs/issue-16.yaml", github_summary_required: true}
result_contract:
  template_path: "docs/agents/worker-result-template.yaml"
  verifier_template_path: "docs/agents/evidence-packet-template.yaml"
  allowed_statuses: [success, blocked, failed]
  forbidden_payloads: [full_worker_transcript, full_verifier_transcript, raw_test_logs]
role_boundary: {orchestrator_may_validate_contract_only: true, worker_may_emit_final_acceptance: false, verifier_packet_required_for_completion: true}
prepared_by: {actor: "Hephaestus", prepared_at: "2026-05-07T14:30:39+08:00"}
