schema_version: "1.0"
kind: issue_packet
line_cap: 80

issue:
  number: "6"
  title: "Published Dashboard Link and view-only runtime"
  url: "https://github.com/paulpai0412/wferp/issues/6"
  labels: [ready-for-agent]
  parent: {type: "prd", reference: "https://github.com/paulpai0412/wferp/issues/1"}

branch: {name: "agent/issue-6-published-dashboard-link-runtime", base: "main"}

objective: "Build the library/runtime tracer bullet for opaque Published Dashboard Links, view-only access, bounded refresh, denial states, and audit events."

acceptance_criteria:
  - {id: "AC1", text: "A Published Dashboard from issue #5 can receive an opaque, non-guessable token scoped to that Published Dashboard.", evidence_hint: "Public API test creates a published dashboard and link; token is opaque and scoped."}
  - {id: "AC2", text: "A valid unexpired unrevoked token opens a view-only Published Dashboard without authoring controls.", evidence_hint: "Runtime render/driver asserts view_only true and no authoring actions."}
  - {id: "AC3", text: "Revoked, expired, malformed, or unpublished tokens are denied without exposing dashboard data.", evidence_hint: "Refusal-path tests assert deterministic denial codes and no payload leak."}
  - {id: "AC4", text: "Published Dashboard reads through a read-only data source on view and supports bounded auto-refresh.", evidence_hint: "Fake read-only data source records view/refresh calls and bounds."}
  - {id: "AC5", text: "Out-of-policy refresh intervals are rejected and refresh failures show safe stale/error states.", evidence_hint: "Policy/failure tests cover too-fast/too-slow intervals and stale/error output."}
  - {id: "AC6", text: "Link creation, denial, revocation, expiration, and refresh failure events are audited.", evidence_hint: "Audit log assertions use stable event names."}

scope:
  in:
    - "Focused skill_scripts module(s) for link tokens, view-only runtime, refresh policy, and audit events."
    - "Focused tests under tests/skill_scripts through public interfaces."
    - "docs/agents/handoffs/issue-6.yaml and docs/agents/evidence/issue-6-pr-<pr>.yaml."
  out:
    - "Browser UI, auth/RBAC, production DB access, arbitrary SQL execution, scheduling service, external embedding SDK."
    - "Changing legacy static schema docs or _Source generation."

bootstrap_context:
  required_reads: ["AGENTS.md", "CONTEXT.md", "docs/agents/autonomous-development-workflow.yaml", "docs/prds/2026-05-06-workflow-erp-dashboard-builder.md", "docs/agents/handoffs/issue-5.yaml"]
  context_budget: {checkpoint_warning_at_percent: 45, stop_and_rotate_at_percent: 50}
  relevant_paths: ["skill_scripts/dashboard_publish.py", "tests/skill_scripts/test_dashboard_publish.py"]
  prior_handoff: "docs/agents/handoffs/issue-5.yaml"

implementation_notes:
  constraints:
    - "Reuse issue #5 PublishedDashboard/version public surface; do not mutate published snapshots."
    - "Use fake/read-only data source boundaries in tests unless existing DB validation surface is clearly required."
    - "Tokens must be opaque/non-guessable; do not expose dashboard data on denial."
    - "Use GIT_MASTER=1 prefix for git commands."
  risks: ["Token links are weaker than authenticated access; include revoke/expire/audit behavior."]
  dependencies: ["Closed: issue #5 final approval and immutable publish."]

verification_plan:
  worker_self_checks:
    - {command: "python3 -m py_compile <changed-python-files>", purpose: "implementation feedback only", success_criteria: "Changed modules compile."}
    - {command: "python3 -m pytest <focused-issue-6-tests> -q", purpose: "implementation feedback only", success_criteria: "Focused public-interface tests pass."}
  verifier_acceptance_checks:
    required_gates: ["diagnostics_and_build_gate", "surface_qa_gate", "review_gate"]
    automated_checks: [{command: "python3 -m pytest <focused-issue-6-tests> -q", success_criteria: "Verifier observes AC coverage pass."}]
  verifier_manual_qa:
    owner: "pr_verifier"
    surface: "library"
    happy_path: "Create a published dashboard link, resolve it, render view-only runtime, and observe bounded refresh."
    refusal_or_error_path: "Try malformed, expired, revoked, unpublished tokens and refresh failure; confirm safe denial/stale state."

handoff_contract: {repo_path: "docs/agents/handoffs/issue-6.yaml", github_summary_required: true}
result_contract: {template_path: "docs/agents/worker-result-template.yaml", verifier_template_path: "docs/agents/evidence-packet-template.yaml", allowed_statuses: [success, blocked, failed]}
role_boundary: {orchestrator_may_validate_contract_only: true, worker_may_emit_final_acceptance: false, verifier_packet_required_for_completion: true}
