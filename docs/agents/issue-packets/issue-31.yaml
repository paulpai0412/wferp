schema_version: "1.0"
kind: issue_packet
line_cap: 80
raw_evidence_policy: index_only_refs_no_raw_logs_or_transcripts

issue:
  number: "31"
  title: "E2E: Deterministic ACTMK fixture and SQL correctness"
  url: "https://github.com/paulpai0412/wferp/issues/31"
  labels: [ready-for-agent, e2e-test-case]
  parent: {type: "prd", reference: "https://github.com/paulpai0412/wferp/issues/30"}

branch: {name: "agent/issue-31-deterministic-actmk-sql-correctness", base: "main"}
objective: "Materialize E2E-002 by proving deterministic 2026 ACTMK budget correctness through the existing governed-query test-db path."

acceptance_criteria:
  - {id: "AC1", text: "Deterministic ACTMK fixture data provides three 2026 rows plus one 2025 contrast row, with the 2026 rows summing MK006 to 450000.", evidence_hint: "Verifier checks test_db/init/01_create_wferp_test.sql and rerun output refs."}
  - {id: "AC2", text: "A real DB_ENV=test execution path verifies returned columns include MK002 and MK006, the 2026 result row count is 3, and sum(MK006)=450000.", evidence_hint: "Verifier reruns tests/skill_scripts/test_sql_correctness_e2e.py against the seeded test DB."}
  - {id: "AC3", text: "The 2025 contrast row remains in fixture coverage but is excluded from the 2026 prompt-intent result.", evidence_hint: "Verifier confirms the contrast-row assertion and the 2026 query result assertions both pass."}
  - {id: "AC4", text: "The slice preserves existing non-production execution guardrails and does not treat exact SQL string equality as the primary assertion.", evidence_hint: "Verifier confirms DB_ENV=test guardrails and result-based assertions in governed-query/sql correctness tests."}
  - {id: "AC5", text: "Worker and verifier artifacts stay compact and reference manifests instead of embedding raw SQL logs.", evidence_hint: "Verifier checks issue #31 worker-result/evidence packet shape and index-only wording."}

test_case:
  applies: true
  id: "E2E-002"
  source: {type: "prd_ac", ref: "#30 E2E-002"}
  surface: "sql"
  scenario: "Deterministic 2026 engineering-budget SQL correctness through governed-query execution in DB_ENV=test."
  expected_outcome: "The 2026 prompt returns exactly three MK002/MK006 rows totaling 450000, while the seeded 2025 contrast row remains excluded from the result."
  regression_bucket: ["test_sql_correctness_e2e", "test_governed_query", "test_execution_validator", "test_sql_router"]

scope:
  in: ["test_db/init/01_create_wferp_test.sql", "tests/skill_scripts/test_sql_correctness_e2e.py", "tests/skill_scripts/test_governed_query.py", "tests/skill_scripts/test_sql_router.py", "tests/skill_scripts/test_database_client.py", "tests/skill_scripts/test_prompt_sql_consistency.py", "skill_scripts/cli_generate_select.py", "skill_scripts/database_client.py", "skill_scripts/governed_query.py", "skill_scripts/sql_router.py", "skill_scripts/execution_validator.py"]
  out: ["Browser UI coverage", "Changing prompt intent away from 2026 engineering budget", "Exact SQL string equality as the release assertion", "Pasting raw SQL logs into repo docs"]

bootstrap_context:
  required_reads: ["AGENTS.md", "docs/agents/autonomous-development-workflow.yaml", "docs/agents/e2e/test-case-issue-loop.md", "docs/prds/2026-05-09-sql-to-dashboard-e2e-test-cases.md"]
  relevant_paths: ["test_db/init/01_create_wferp_test.sql", "test_db/README.md", "tests/skill_scripts/test_sql_correctness_e2e.py", "tests/skill_scripts/test_governed_query.py", "tests/skill_scripts/test_sql_router.py", "tests/skill_scripts/test_database_client.py", "tests/skill_scripts/test_prompt_sql_consistency.py", "skill_scripts/cli_generate_select.py", "skill_scripts/governed_query.py", "skill_scripts/database_client.py", "skill_scripts/sql_router.py", "skill_scripts/execution_validator.py"]
  prior_handoff: "docs/agents/handoffs/issue-28.yaml"
  context_budget: {checkpoint_warning_at_percent: 45, stop_and_rotate_at_percent: 50}

implementation_notes:
  constraints:
    - "Issue worker may run deterministic DB checks for implementation feedback only; final acceptance belongs to a fresh verifier."
    - "Use only DB_ENV=test execution paths and preserve existing read-only guardrails."
    - "Judge correctness by result evidence (columns, row count, aggregates), not exact SQL string equality."
    - "Keep worker/verifier artifacts compact and index-only; no raw SQL logs or transcripts."
  risks: ["SQL Server 2019 test containers need explicit legacy guardrails because true SQL Server 2000 compatibility mode is unavailable."]
  dependencies: ["Issue #28 is released; issue #31 is the next serial E2E issue and unblocks issues #32 and #33."]

verification_plan:
  worker_self_checks:
    - {command: "WFERP_RUN_DB_E2E=1 python3 -m pytest tests/skill_scripts/test_sql_correctness_e2e.py tests/skill_scripts/test_governed_query.py tests/skill_scripts/test_execution_validator.py tests/skill_scripts/test_sql_router.py -q", purpose: "implementation feedback only", success_criteria: "Deterministic ACTMK target case and focused regression bucket pass in DB_ENV=test before the worker returns."}
  verifier_acceptance_checks:
    required_gates: ["diagnostics_and_build_gate", "surface_qa_gate", "review_gate"]
    automated_checks:
      - {command: "rerun the deterministic ACTMK SQL correctness target case in DB_ENV=test", success_criteria: "Verifier observes three 2026 rows, required columns MK002/MK006, and sum(MK006)=450000 while the 2025 contrast row remains excluded."}
  verifier_manual_qa: {owner: "pr_verifier", surface: "sql", happy_path: "Observe governed-query evidence for the 2026 prompt through the seeded ACTMK fixture.", refusal_or_error_path: "Confirm the 2025 contrast row exists in fixture coverage but is absent from the 2026 result set."}

handoff_contract: {repo_path: "docs/agents/handoffs/issue-31.yaml", github_summary_required: true}
result_contract: {template_path: "docs/agents/worker-result-template.yaml", verifier_template_path: "docs/agents/evidence-packet-template.yaml", allowed_statuses: [success, blocked, failed]}
role_boundary: {orchestrator_may_validate_contract_only: true, worker_may_emit_final_acceptance: false, verifier_packet_required_for_completion: true}
