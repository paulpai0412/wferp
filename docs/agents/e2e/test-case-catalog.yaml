schema_version: "1.0"
kind: test_case_catalog
line_cap: 80
raw_evidence_policy: index_only_refs_no_raw_logs_or_transcripts

purpose: >
  Compact operational index for executable E2E test case issues. Raw logs,
  traces, screenshots, and transcripts stay outside repo docs.

update_policy:
  owner: main_orchestrator_contract_validation_only
  update_when:
    - e2e_test_case_issue_created
    - verifier_evidence_packet_validated
    - release_worker_reports_merge_or_blocker
    - phase_refactor_updates_metadata_refs

entries:
  - id: "E2E-001"
    source: {type: "prd_ac", ref: "#30 E2E-001"}
    issue: {number: "32", url: "https://github.com/paulpai0412/wferp/issues/32", labels: [ready-for-agent, e2e-test-case]}
    surface: "cli|library"
    status: "in-progress"
    latest_pr: {number: "36", url: "https://github.com/paulpai0412/wferp/pull/36"}
    latest_evidence_packet: ""
    latest_failure_signature: "none"
    prior_verified_refs: [{issue: "28", pr: "29", evidence_packet: "docs/agents/evidence/issue-28-pr-29.yaml", source: "#1 AC17"}]
    latest_refactor_refs: []
    affected_by_refactor: false
    next_recommended_step: "Spawn a fresh verifier for PR #36 to check E2E-001 live evidence plus deterministic regression."

  - id: "E2E-003"
    source: {type: "prd_ac", ref: "#30 E2E-003"}
    issue: {number: "33", url: "https://github.com/paulpai0412/wferp/issues/33", labels: [ready-for-agent, e2e-test-case]}
    surface: "library"
    status: "in-progress"
    latest_pr: {number: "", url: ""}
    latest_evidence_packet: ""
    latest_failure_signature: "none"
    prior_verified_refs: []
    latest_refactor_refs: []
    affected_by_refactor: false
    next_recommended_step: "Spawn a fresh pr_verifier for the issue #33 PR to confirm E2E-003 target case plus the dashboard-builder regression bucket."

entry_schema:
  id: "E2E-001"
  source: {type: "prd_ac|bug_report|regression|manual_risk", ref: "<ref>"}
  issue: {number: "<issue-number>", url: "<issue-url>", labels: [e2e-test-case]}
  surface: "cli|api|browser|library|sql|static-html"
  status: "draft|needs-triage|ready-for-agent|in-progress|verified|blocked|released|wontfix"
  latest_pr: {number: "<pr-number-or-none>", url: "<pr-url-or-empty>"}
  latest_evidence_packet: "docs/agents/evidence/issue-<issue-number>-pr-<pr-number>.yaml"
  latest_failure_signature: "<stable-signature-or-none>"
  latest_refactor_refs: ["docs/agents/refactor/<phase-name>-audit.yaml"]
  affected_by_refactor: false
  next_recommended_step: "<single next action>"
